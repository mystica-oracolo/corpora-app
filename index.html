<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no,maximum-scale=1">
<title>NutriTrack Pro</title>
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NutriTrack">
<meta name="mobile-web-app-capable" content="yes">
<link id="pwa-manifest" rel="manifest">
<link id="apple-touch-icon" rel="apple-touch-icon" sizes="192x192">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"></noscript>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login-scr">
  <div class="l-wrap">
    <div class="l-logo-ring"><div class="l-logo-inner">🥗</div></div>
    <div class="l-title">NUTRITRACK</div>
    <div class="l-tagline">Il tuo diario personale</div>
    <div class="l-profiles" id="l-profiles" style="display:none">
      <div class="l-profiles-title">Accesso rapido</div>
      <div class="l-profiles-grid" id="l-profiles-grid"></div>
    </div>
    <div class="l-or" id="l-or" style="display:none"><span>oppure accedi</span></div>
    <div class="l-new-card">
      <div class="l-new-title" id="l-form-title">ACCEDI O REGISTRATI</div>
      <div class="l-field-wrap">
        <span class="l-field-ico">👤</span>
        <input class="l-name-inp" id="l-name" type="text" placeholder="Il tuo nome..." autocomplete="name" oninput="onNameInput()" onkeydown="if(event.key==='Enter')focusPin()">
      </div>
      <div style="font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:700;color:#6b7280;letter-spacing:1.5px;text-transform:uppercase;margin:10px 0 8px">PIN (4 cifre)</div>
      <div class="l-pin-row">
        <input class="l-pin-digit" id="pin0" type="password" inputmode="numeric" maxlength="1" oninput="pinFilter(this,0)" onkeydown="pinBack(event,0)">
        <input class="l-pin-digit" id="pin1" type="password" inputmode="numeric" maxlength="1" oninput="pinFilter(this,1)" onkeydown="pinBack(event,1)">
        <input class="l-pin-digit" id="pin2" type="password" inputmode="numeric" maxlength="1" oninput="pinFilter(this,2)" onkeydown="pinBack(event,2)">
        <input class="l-pin-digit" id="pin3" type="password" inputmode="numeric" maxlength="1" oninput="pinFilter(this,3)" onkeydown="pinBack(event,3)" onkeyup="if(this.value)doLogin()">
      </div>
      <div class="l-pin-hint" id="l-pin-hint">Prima volta? Scegli 4 cifre che ricordi facilmente</div>
      <div class="l-err" id="l-err"></div>
      <button class="l-start-btn" onclick="doLogin()">ACCEDI →</button>
      <div style="margin-top:12px;text-align:center">
        <button onclick="showForgotPin()" style="background:none;border:none;font-family:'IBM Plex Mono',monospace;font-size:10px;color:#6b7280;cursor:pointer;text-decoration:underline;letter-spacing:.3px;padding:4px 8px;">🔑 PIN dimenticato?</button>
      </div>
      <div style="margin-top:8px;text-align:center;font-family:'IBM Plex Mono',monospace;font-size:9px;color:#374151">🔒 PIN cifrato sul dispositivo · nessun dato inviato in rete</div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app-wrap" style="display:none">
  <div class="hdr">
    <div class="hdr-left">
      <button class="back-btn" id="back-btn" style="display:none" onclick="snd();navBack()">‹ Indietro</button>
      <div class="hdr-titles">
        <div class="hdr-title" id="hdr-title">NUTRITRACK</div>
        <div class="hdr-sub" id="hdr-sub">PRO</div>
      </div>
    </div>
    <div class="hdr-avatar" id="hdr-avatar" onclick="snd();showAvatarMenu()" title="Profilo / Esci">?</div>
  </div>
  <div class="kcal-progress-bar" id="hdr-pb"><div class="kcal-progress-fill" id="hdr-progress" style="width:0%"></div></div>
  <div class="kcal-progress-bar" id="hdr-pb"><div class="kcal-progress-fill" id="hdr-progress" style="width:0%"></div></div>
  <div class="screen" id="screen"></div>
  <span id="storage-status" style="display:none">localStorage</span>
</div>

<!-- MODAL -->
<div class="modal-ov" id="modal" onclick="modalBg(event)">
  <div class="modal-box" id="modal-box"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="bnav-btn active" id="bnav-home" onclick="snd();navGoHome()">
    <span class="bnav-ico">🏠</span>
    <span class="bnav-lbl">Home</span>
    <span class="bnav-dot"></span>
  </button>
  <button class="bnav-btn" id="bnav-workout" onclick="snd();bnavGo(showWorkout,'workout')">
    <span class="bnav-ico">💪</span>
    <span class="bnav-lbl">Esercizi</span>
    <span class="bnav-dot"></span>
  </button>
  <button class="bnav-btn" id="bnav-profilo" onclick="snd();bnavGo(showProfilo,'profilo')">
    <span class="bnav-ico">👤</span>
    <span class="bnav-lbl">Profilo</span>
    <span class="bnav-dot"></span>
  </button>
  <button class="bnav-btn" id="bnav-more" onclick="snd();showMoreMenu()">
    <span class="bnav-ico">⋯</span>
    <span class="bnav-lbl">Altro</span>
    <span class="bnav-dot"></span>
  </button>
</nav>

<!-- REST TIMER -->
<div class="rest-timer-overlay" id="rest-timer">
  <div class="rest-timer-title">RECUPERO</div>
  <div class="rest-timer-name" id="rt-name">—</div>
  <div class="rest-timer-ring">
    <svg><circle class="rest-timer-circle-bg" cx="85" cy="85" r="70"/><circle class="rest-timer-circle" id="rt-circle" cx="85" cy="85" r="70" stroke-dasharray="439.8" stroke-dashoffset="0"/></svg>
    <div class="rest-timer-num"><div class="rest-timer-sec" id="rt-sec">60</div><div class="rest-timer-lbl">secondi</div></div>
  </div>
  <div class="rest-timer-btns">
    <button class="rest-timer-btn skip" onclick="snd();skipRestTimer()">⏭ SALTA</button>
    <button class="rest-timer-btn stop" onclick="snd('delete');stopRestTimer()">✕ STOP</button>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- FAB -->
<button class="fab" id="fab-main" onclick="snd();fabAction()">＋</button>

<script src="app.js"></script>
<script src="onboarding.js"></script>
<script src="fase3-upgrade.js"></script>
<script src="fase4-motore-nutrizionale.js"></script>
<script src="fase5-motore-allenamento.js"></script>
<script src="fase6-database.js"></script>
<script src="fase7-design-system.js"></script>
<script src="fase8-kpi-gamification-compliance.js"></script>
<script src="fase11-barcode.js"></script>
<script src="fase13-mia-scheda.js"></script>

</body>
</html>
